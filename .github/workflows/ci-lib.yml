name: CI — impala-lib

on:
  push:
    branches: [main]
    paths:
      - 'impala-lib/**'
      - 'impala-card/**'
      - '.github/workflows/ci-lib.yml'
  pull_request:
    branches: [main]
    paths:
      - 'impala-lib/**'
      - 'impala-card/**'
      - '.github/workflows/ci-lib.yml'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: impala-lib
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-lib-${{ hashFiles('impala-lib/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-lib-

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lib-test-reports
          path: impala-lib/build/reports/tests/

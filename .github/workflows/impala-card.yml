# =============================================================================
# CI for impala-card
#
# Builds and tests the Kotlin Multiplatform SDK and the JavaCard applet.
#
# Triggers:
#   - Push to main (paths under impala-card/): test + build + publish
#   - Pull request to main (paths under impala-card/): test + build only
#   - Manual dispatch: full run
#
# Jobs:
#   test               JVM SDK tests (network-agnostic).
#   build-cap-testnet  Builds CAP with build.xml defaults. Uploads
#                      ImpalaApplet-testnet-cap-<sha> (90d retention).
#   build-cap-live     Builds CAP with live AID + issuer key from
#                      production-card-keys env. Uploads
#                      ImpalaApplet-live-cap-<sha> (90d retention).
#   caprunner          Non-blocking. Downloads testnet CAP, runs APDU emulator.
#   publish            main only. Publishes SDK; re-uploads both CAPs at 365d.
#   release            Tag only. Bundles both CAPs + SDK zip into the release.
#
# Required secrets (live CAP build, production-card-keys environment):
#   IMPALA_CARD_LIVE_AID         - applet package AID (8 bytes hex)
#   IMPALA_CARD_LIVE_AID_APP     - applet instance AID (10 bytes hex)
#   IMPALA_CARD_LIVE_ISSUER_KEY  - GP issuer key (16 bytes, colon-separated hex)
#
# The testnet CAP is built unconditionally with the build.xml defaults
# (AID 0102030405060708, default GP key 40:41:42:...:4F).
# The publish job uses the built-in GITHUB_TOKEN with packages:write permission.
# =============================================================================

name: impala-card

on:
  push:
    branches: [main]
    tags:
      - 'impala-card-v*'
    paths:
      - 'impala-card/**'
      - '.github/workflows/impala-card.yml'
  pull_request:
    branches: [main]
    paths:
      - 'impala-card/**'
      - '.github/workflows/impala-card.yml'
  workflow_dispatch:

concurrency:
  group: impala-card-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ===========================================================================
  # SDK JVM tests — network-agnostic, runs once
  # ===========================================================================
  test:
    name: Test SDK (JVM)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: impala-card

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: SDK JVM tests
        run: ./gradlew :sdk:jvmTest --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports-${{ github.sha }}
          path: |
            impala-card/**/build/reports/tests/**
            impala-card/**/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14

  # ===========================================================================
  # Build testnet CAP — runs on every push/PR with default (non-secret) keys.
  # AID + issuer key come from build.xml defaults.
  # ===========================================================================
  build-cap-testnet:
    name: Build CAP (testnet)
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: impala-card

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build applet CAP (testnet defaults)
        run: ./gradlew :applet:buildJavacard --no-daemon --stacktrace

      - name: Upload testnet CAP
        uses: actions/upload-artifact@v4
        with:
          name: ImpalaApplet-testnet-cap-${{ github.sha }}
          path: impala-card/applet/build/ImpalaApplet.cap
          if-no-files-found: error
          retention-days: 90

  # ===========================================================================
  # Build live CAP — gated on production-card-keys environment so the issuer
  # key requires reviewer approval. Skipped on PRs from forks.
  # ===========================================================================
  build-cap-live:
    name: Build CAP (live)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment: production-card-keys

    defaults:
      run:
        working-directory: impala-card

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build applet CAP (live AID + issuer key)
        env:
          LIVE_AID: ${{ secrets.IMPALA_CARD_LIVE_AID }}
          LIVE_AID_APP: ${{ secrets.IMPALA_CARD_LIVE_AID_APP }}
          LIVE_ISSUER_KEY: ${{ secrets.IMPALA_CARD_LIVE_ISSUER_KEY }}
        run: |
          if [ -z "$LIVE_AID" ] || [ -z "$LIVE_AID_APP" ] || [ -z "$LIVE_ISSUER_KEY" ]; then
            echo "::error::Missing IMPALA_CARD_LIVE_* secrets in production-card-keys environment"
            exit 1
          fi
          ./gradlew :applet:buildJavacard --no-daemon --stacktrace \
            -Papplet.aid="$LIVE_AID" \
            -Papplet.aid.app="$LIVE_AID_APP" \
            -Papplet.issuerkey="$LIVE_ISSUER_KEY"

      - name: Upload live CAP
        uses: actions/upload-artifact@v4
        with:
          name: ImpalaApplet-live-cap-${{ github.sha }}
          path: impala-card/applet/build/ImpalaApplet.cap
          if-no-files-found: error
          retention-days: 90

  # ===========================================================================
  # CAPRunner — Python-based APDU emulation. Non-blocking.
  #
  # CAPRunner targets JavaCard <= 3.0.1 while the applet targets 3.0.5, so
  # cryptographic APDUs (ECDSA-SHA256, secp256r1) may mismatch. Individual
  # test scripts and the job itself are marked continue-on-error so these
  # expected mismatches surface as warnings without blocking the PR.
  # ===========================================================================
  caprunner:
    name: CAPRunner emulation
    needs: build-cap-testnet
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download testnet CAP
        uses: actions/download-artifact@v4
        with:
          name: ImpalaApplet-testnet-cap-${{ github.sha }}
          path: impala-card/applet/build/

      - name: Cache CAPRunner vendor + venv
        uses: actions/cache@v4
        with:
          path: |
            impala-card/caprunner/vendor
            impala-card/caprunner/.venv
            impala-card/caprunner/3.0.1.json
            impala-card/caprunner/3.0.4.json
            impala-card/caprunner/3.0.5.json
          key: caprunner-${{ runner.os }}-${{ hashFiles('impala-card/caprunner/setup.sh') }}

      - name: CAPRunner setup
        working-directory: impala-card/caprunner
        run: ./setup.sh

      - name: Run test_basic.txt
        working-directory: impala-card/caprunner
        continue-on-error: true
        run: ./test.sh scripts/test_basic.txt

      - name: Run test_initialize.txt
        working-directory: impala-card/caprunner
        continue-on-error: true
        run: ./test.sh scripts/test_initialize.txt

      - name: Run test_pin.txt
        working-directory: impala-card/caprunner
        continue-on-error: true
        run: ./test.sh scripts/test_pin.txt

  # ===========================================================================
  # Publish — SDK to GitHub Packages + long-retention CAP artifact.
  # Main-branch push only.
  # ===========================================================================
  publish:
    name: Publish SDK + CAPs
    needs: [build-cap-testnet, build-cap-live]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: impala-card

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # SDK is network-agnostic — single coordinate serves both testnet and live.
      # The sdk/build.gradle.kts publishing block uses PasswordCredentials for
      # a repo named "githubPackages"; Gradle resolves these from
      # ORG_GRADLE_PROJECT_<name>Username / <name>Password env vars.
      - name: Publish SDK to GitHub Packages
        env:
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :sdk:publishAllPublicationsToGithubPackagesRepository --no-daemon --stacktrace

      - name: Download testnet CAP
        uses: actions/download-artifact@v4
        with:
          name: ImpalaApplet-testnet-cap-${{ github.sha }}
          path: dist/testnet/

      - name: Download live CAP
        uses: actions/download-artifact@v4
        with:
          name: ImpalaApplet-live-cap-${{ github.sha }}
          path: dist/live/

      - name: Upload testnet CAP (long retention)
        uses: actions/upload-artifact@v4
        with:
          name: ImpalaApplet-testnet-cap-main-${{ github.sha }}
          path: impala-card/dist/testnet/ImpalaApplet.cap
          if-no-files-found: error
          retention-days: 365

      - name: Upload live CAP (long retention)
        uses: actions/upload-artifact@v4
        with:
          name: ImpalaApplet-live-cap-main-${{ github.sha }}
          path: impala-card/dist/live/ImpalaApplet.cap
          if-no-files-found: error
          retention-days: 365

  # ===========================================================================
  # GitHub Release — tag-push only (impala-card-v*). Builds the CAP and
  # assembles the SDK, bundles the SDK outputs (JVM jar + Android AARs) into
  # a zip, and attaches everything to a GitHub Release named after the tag.
  # ===========================================================================
  release:
    name: GitHub Release
    needs: [build-cap-testnet, build-cap-live]
    if: startsWith(github.ref, 'refs/tags/impala-card-v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: impala-card

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble SDK
        run: ./gradlew :sdk:assemble --no-daemon --stacktrace

      - name: Download testnet CAP
        uses: actions/download-artifact@v4
        with:
          name: ImpalaApplet-testnet-cap-${{ github.sha }}
          path: applet/build/testnet/

      - name: Download live CAP
        uses: actions/download-artifact@v4
        with:
          name: ImpalaApplet-live-cap-${{ github.sha }}
          path: applet/build/live/

      - name: Stage release assets
        run: |
          VERSION="${GITHUB_REF_NAME#impala-card-v}"
          mkdir -p dist
          cp applet/build/testnet/ImpalaApplet.cap "dist/ImpalaApplet-${VERSION}-testnet.cap"
          cp applet/build/live/ImpalaApplet.cap    "dist/ImpalaApplet-${VERSION}-live.cap"

          SDK_STAGE="impala-sdk-${VERSION}"
          mkdir -p "dist/${SDK_STAGE}"
          find sdk/build/libs -name '*.jar' -exec cp {} "dist/${SDK_STAGE}/" \; 2>/dev/null || true
          find sdk/build/outputs/aar -name '*.aar' -exec cp {} "dist/${SDK_STAGE}/" \; 2>/dev/null || true
          (cd dist && zip -r "${SDK_STAGE}.zip" "${SDK_STAGE}" && rm -rf "${SDK_STAGE}")

          (cd dist && sha256sum \
            "ImpalaApplet-${VERSION}-testnet.cap" \
            "ImpalaApplet-${VERSION}-live.cap" \
            "${SDK_STAGE}.zip" > SHA256SUMS)
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: impala-card ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            impala-card/dist/ImpalaApplet-*.cap
            impala-card/dist/impala-sdk-*.zip
            impala-card/dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

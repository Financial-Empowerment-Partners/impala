# =============================================================================
# CI for the Android sub-projects: impala-android-demo + impala-lib.
#
# Triggers:
#   - Push or PR to main on paths under impala-android-demo/, impala-lib/, or
#     impala-card/. impala-card is included because impala-lib pulls
#     :impala-card:sdk via a composite build (see impala-lib/settings.gradle.kts),
#     so a regression in :sdk can break the lib build/tests.
#   - Manual workflow_dispatch.
#
# Jobs:
#   unit-tests          JVM unit tests. Demo runs both flavors
#                       (testTestnetDebugUnitTest, testLiveDebugUnitTest); lib
#                       is flavor-agnostic. Robolectric covers minSdk + targetSdk
#                       in a single invocation via @Config(sdk = [24, 36]).
#   assemble            assembleTestnetDebug + assembleLiveDebug for the demo
#                       (two APKs uploaded as separate artifacts) and
#                       assembleDebug for the lib (single AAR).
#   instrumented-tests  Matrix on api-level [24, 36]. Runs the testnet flavor's
#                       connectedTestnetDebugAndroidTest (live flavor exercises
#                       the same code paths and would just double emulator boot
#                       time). lib's instrumented tests also run.
#
# No external secrets required.
# =============================================================================

name: impala-android

on:
  push:
    branches: [main]
    paths:
      - 'impala-android-demo/**'
      - 'impala-lib/**'
      - 'impala-card/**'
      - '.github/workflows/impala-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'impala-android-demo/**'
      - 'impala-lib/**'
      - 'impala-card/**'
      - '.github/workflows/impala-android.yml'
  workflow_dispatch:

concurrency:
  group: impala-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Unit tests — JVM-side, Robolectric multi-SDK for the SDK-sensitive classes.
  # ===========================================================================
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: impala-android-demo unit tests (testnet + live flavors)
        working-directory: impala-android-demo
        run: ./gradlew testTestnetDebugUnitTest testLiveDebugUnitTest --no-daemon --stacktrace

      - name: impala-lib unit tests
        working-directory: impala-lib
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-unit-test-reports-${{ github.sha }}
          path: |
            impala-android-demo/**/build/reports/tests/**
            impala-android-demo/**/build/test-results/**
            impala-lib/**/build/reports/tests/**
            impala-lib/**/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14

  # ===========================================================================
  # Assemble — debug APK + AAR. Uploaded as artifacts.
  # ===========================================================================
  assemble:
    name: Assemble debug
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Assemble demo APKs (testnet + live)
        working-directory: impala-android-demo
        run: ./gradlew assembleTestnetDebug assembleLiveDebug --no-daemon --stacktrace

      - name: Assemble lib AAR
        working-directory: impala-lib
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload testnet demo APK
        uses: actions/upload-artifact@v4
        with:
          name: impala-android-demo-testnet-debug-${{ github.sha }}
          path: impala-android-demo/app/build/outputs/apk/testnet/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload live demo APK
        uses: actions/upload-artifact@v4
        with:
          name: impala-android-demo-live-debug-${{ github.sha }}
          path: impala-android-demo/app/build/outputs/apk/live/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload lib AAR
        uses: actions/upload-artifact@v4
        with:
          name: impala-lib-debug-${{ github.sha }}
          path: impala-lib/build/outputs/aar/*-debug.aar
          if-no-files-found: error
          retention-days: 90

  # ===========================================================================
  # Instrumented tests — x86_64 emulator matrix on minSdk + targetSdk.
  #
  # Uses reactivecircus/android-emulator-runner. The first invocation per
  # (api-level, target) creates and caches an AVD snapshot; subsequent runs
  # reuse it. KVM acceleration is enabled via udev rule so the emulator runs
  # at native speed on the hosted runner.
  # ===========================================================================
  instrumented-tests:
    name: Instrumented (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: 24
            target: default
          - api-level: 36
            target: google_apis

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}-v1

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot generated for caching."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            cd impala-android-demo && ./gradlew connectedTestnetDebugAndroidTest --no-daemon --stacktrace
            cd ../impala-lib && ./gradlew connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload instrumented test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-api${{ matrix.api-level }}-${{ github.sha }}
          path: |
            impala-android-demo/**/build/reports/androidTests/**
            impala-android-demo/**/build/outputs/androidTest-results/**
            impala-lib/**/build/reports/androidTests/**
            impala-lib/**/build/outputs/androidTest-results/**
          if-no-files-found: ignore
          retention-days: 14

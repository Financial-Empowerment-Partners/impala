name: CI — impala-android-demo

on:
  push:
    branches: [main]
    paths:
      - 'impala-android-demo/**'
      - 'impala-lib/**'
      - 'impala-card/**'
      - '.github/workflows/ci-demo.yml'
  pull_request:
    branches: [main]
    paths:
      - 'impala-android-demo/**'
      - 'impala-lib/**'
      - 'impala-card/**'
      - '.github/workflows/ci-demo.yml'

jobs:
  build-and-test:
    name: assembleDebug + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: impala-android-demo
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-demo-${{ hashFiles('impala-android-demo/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-demo-

      - name: Stub google-services.json (FCM not exercised in CI)
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-stub",
              "storage_bucket": "ci-stub.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.payala.impala.demo" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "AIza00000000000000000000000000000000000" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          JSON

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-test-reports
          path: impala-android-demo/app/build/reports/

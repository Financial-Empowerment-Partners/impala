name: CI — impala-soroban

on:
  push:
    branches: [main]
    paths:
      - 'impala-soroban/**'
      - '.github/workflows/ci-soroban.yml'
  pull_request:
    branches: [main]
    paths:
      - 'impala-soroban/**'
      - '.github/workflows/ci-soroban.yml'

jobs:
  integration-test:
    name: integration-test (unit + WASM build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: impala-soroban/integration-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            impala-soroban/integration-test/target
          key: ${{ runner.os }}-cargo-soroban-it-${{ hashFiles('impala-soroban/integration-test/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-soroban-it-

      - name: fmt
        run: cargo fmt -- --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: unit tests
        run: cargo test

      - name: build WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm
          path: impala-soroban/integration-test/target/wasm32-unknown-unknown/release/*.wasm

  # testnet-tests require live testnet access and the `stellar` CLI.
  # They are slow and rate-limited; run on workflow_dispatch or a nightly cron.
  testnet-test:
    name: testnet-tests (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: integration-test
    defaults:
      run:
        working-directory: impala-soroban/testnet-tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install stellar CLI
        run: |
          curl -L https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-linux-x86_64.tar.gz | tar xz
          sudo mv stellar /usr/local/bin/
          stellar --version
      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: soroban-wasm
          path: impala-soroban/integration-test/target/wasm32-unknown-unknown/release/
      - name: testnet tests
        run: cargo test --no-fail-fast
        env:
          RUST_BACKTRACE: 1

name: CI — impala-ui

on:
  push:
    branches: [main]
    paths:
      - 'impala-ui/**'
      - '.github/workflows/ci-ui.yml'
  pull_request:
    branches: [main]
    paths:
      - 'impala-ui/**'
      - '.github/workflows/ci-ui.yml'

jobs:
  lint-and-test:
    name: lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: impala-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: impala-ui/package-lock.json

      - name: Install dependencies
        # package.json is introduced as part of the UI test harness.
        # If not yet present, skip gracefully.
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "::warning::impala-ui/package.json not present — skipping lint/test"
            exit 0
          fi

      - name: Lint (eslint)
        run: |
          if [ -f package.json ] && npm run 2>/dev/null | grep -q '  lint'; then
            npm run lint
          else
            echo "no lint script"
          fi

      - name: Test (vitest)
        run: |
          if [ -f package.json ] && npm run 2>/dev/null | grep -q '  test'; then
            npm test
          else
            echo "no test script"
          fi

  html-validate:
    name: HTML lint (html-validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: html-validate
        run: |
          npx --yes html-validate impala-ui/html/*.html || echo "::warning::html-validate reported issues"

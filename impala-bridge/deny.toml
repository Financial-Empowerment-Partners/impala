# cargo-deny configuration for impala-bridge
# Run with: `cargo deny check`
# See https://embarkstudios.github.io/cargo-deny/ for reference.

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
ignore = []
# Block the build on any advisory unless explicitly ignored above.

[licenses]
version = 2
# Allow common permissive licenses. Reject GPL/AGPL etc. by omission.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
confidence-threshold = 0.8
exceptions = []

# ring has its own license blob that cargo-deny can't parse cleanly.
[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = [
    # Explicitly banned crates go here (e.g. known-abandoned duplicates).
]
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impala - Okta Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/css/foundation.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card" style="text-align: center;">
            <h2>Impala</h2>
            <div class="loading-spinner" style="margin: 2rem 0;">
                <div style="border: 4px solid #f3f3f3; border-top: 4px solid #1779ba; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            </div>
            <p id="okta-callback-status">Processing Okta login...</p>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/okta-auth.js"></script>
    <script>
        OktaAuth.handleCallback();
    </script>
</body>
</html>
